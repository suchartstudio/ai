<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Object Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
        }
        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            aspect-ratio: 16/9;
        }
        header {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: 2px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            flex-grow: 1;
        }
        .summary-panel {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto; /* หากเลือกวัตถุเยอะ จะสามารถเลื่อนดูได้ */
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #aaaaaa;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 4.5rem;
            font-weight: 700;
            margin-top: 5px;
        }
        .chart-panel {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <header>LIVE DYNAMIC DASHBOARD</header>

    <div class="container">
        <!-- ป้ายจะถูกสร้างอัตโนมัติด้วย Javascript -->
        <div class="summary-panel" id="summary-panel">
            <h3 style="text-align:center; color:#555;">กำลังรอข้อมูลจาก Mac mini...</h3>
        </div>

        <div class="chart-panel">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:d13363f9f07316e06ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // -----------------------------------------
        // ตั้งค่า Chart.js เริ่มต้น
        // -----------------------------------------
        const ctx = document.getElementById('historyChart').getContext('2d');
        Chart.defaults.font.family = "'Chakra Petch', sans-serif";
        Chart.defaults.color = '#ffffff';

        let historyChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { font: { size: 16 } } } },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 14 } } },
                    x: { ticks: { font: { size: 14 } } }
                }
            }
        });

        // -----------------------------------------
        // ระบบสร้าง UI อัตโนมัติ (Dynamic Builder)
        // -----------------------------------------
        const MAX_DATA_POINTS = 20;
        let currentTargets = [];
        
        // ชุดสี Neon สำหรับแยกประเภทวัตถุ
        const themeColors = ['#00ffcc', '#ff3366', '#ffcc00', '#33ccff', '#cc33ff', '#ff9933'];

        function buildDashboardUI(targets) {
            currentTargets = targets;
            const summaryPanel = document.getElementById('summary-panel');
            summaryPanel.innerHTML = ''; // ล้างหน้าจอเดิม

            historyChart.data.datasets = []; // ล้างเส้นกราฟเดิม
            historyChart.data.labels = [];

            targets.forEach((target, index) => {
                const color = themeColors[index % themeColors.length];

                // 1. สร้างกล่องตัวเลข (Big & Bold)
                const boxHtml = `
                    <div class="stat-box" style="border-color: ${color}; background-color: ${color}11;">
                        <div class="stat-title">${target}</div>
                        <div class="stat-value" id="val-${target}" style="color: ${color};">0</div>
                    </div>
                `;
                summaryPanel.insertAdjacentHTML('beforeend', boxHtml);

                // 2. สร้างเส้นกราฟใหม่
                historyChart.data.datasets.push({
                    label: target.toUpperCase(),
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '33', // เติมโปร่งแสงใต้กราฟ
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true
                });
            });
            historyChart.update();
        }

        // -----------------------------------------
        // รับข้อมูล Real-time จาก Firebase
        // -----------------------------------------
        const objectCountsRef = ref(db, 'object_counts');

        onValue(objectCountsRef, (snapshot) => {
            const payload = snapshot.val();
            if (!payload) return;

            const incomingTargets = payload.active_targets || [];

            // ตรวจสอบว่ามีการเปลี่ยนประเภทวัตถุจาก Mac mini หรือไม่?
            // ถ้ามีการเริ่มรันระบบใหม่และเปลี่ยนวัตถุ ให้รีเซ็ตหน้าจอใหม่
            if (JSON.stringify(incomingTargets) !== JSON.stringify(currentTargets)) {
                buildDashboardUI(incomingTargets);
            }

            const counts = payload.data || {};
            
            // สร้างเวลาแกน X
            const now = new Date();
            const timeLabel = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
            historyChart.data.labels.push(timeLabel);
            if (historyChart.data.labels.length > MAX_DATA_POINTS) {
                historyChart.data.labels.shift();
            }

            // อัปเดตตัวเลขและเส้นกราฟตามเป้าหมาย
            incomingTargets.forEach((target, index) => {
                const count = counts[target] || 0;
                
                // อัปเดตตัวเลข
                const valElement = document.getElementById(`val-${target}`);
                if (valElement) valElement.innerText = count;

                // อัปเดตกราฟ
                historyChart.data.datasets[index].data.push(count);
                if (historyChart.data.datasets[index].data.length > MAX_DATA_POINTS) {
                    historyChart.data.datasets[index].data.shift();
                }
            });
            historyChart.update();
        });
    </script>
</body>
</html>
