<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard | Object Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 15px;
            width: 100vw; height: 100vh; 
            box-sizing: border-box; display: flex; 
            flex-direction: column; overflow: hidden; 
        }
        header {
            text-align: left; padding-bottom: 10px; margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: flex-end;
            height: 60px;
        }
        header h1 { margin: 0; font-size: 2rem; color: #38bdf8; letter-spacing: 1px; }
        header span { color: #34d399; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }
        
        .dashboard {
            display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: auto 1fr;
            gap: 15px; height: calc(100vh - 105px); 
        }
        .kpi-container {
            grid-column: 1 / -1; display: flex; gap: 15px; 
            flex-wrap: nowrap; overflow: hidden; 
        }
        .panel {
            background-color: var(--card-bg); border-radius: 12px; padding: 15px;
            display: flex; flex-direction: column; border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); min-height: 0;
        }
        .panel h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--text-muted); text-transform: uppercase; }
        
        .stat-box {
            flex: 1; min-width: 120px; background: rgba(255, 255, 255, 0.03);
            border-left: 5px solid; border-radius: 8px; padding: 15px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .total-box {
            background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(52,211,153,0.1));
            border-left: 5px solid #ffffff !important;
        }
        .stat-title { font-size: 1.2rem; font-weight: 600; color: #cbd5e1; text-transform: uppercase; }
        .stat-value { font-size: 3.5rem; font-weight: 700; margin-top: 5px; line-height: 1; }
        
        .chart-wrapper { position: relative; flex-grow: 1; min-height: 0; }
        canvas { width: 100% !important; height: 100% !important; }
        .side-panels { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; min-height: 0; }
    </style>
</head>
<body>

    <header>
        <h1>ACCUMULATED TREND ANALYTICS</h1>
        <span id="last-update">ELAPSED TIME: 00:00</span>
    </header>

    <div class="dashboard">
        <div class="kpi-container" id="kpi-panel"></div>

        <div class="panel">
            <h3>📈 Fixed Timeline Trend (แนวโน้มสะสมตั้งแต่เริ่มต้น)</h3>
            <div class="chart-wrapper"><canvas id="lineChart"></canvas></div>
        </div>

        <div class="side-panels">
            <div class="panel">
                <h3>📊 Accumulated Distribution (เทียบยอดสะสม)</h3>
                <div class="chart-wrapper"><canvas id="barChart"></canvas></div>
            </div>
            <div class="panel">
                <h3>🍩 Session Proportion (สัดส่วนสะสม)</h3>
                <div class="chart-wrapper"><canvas id="doughnutChart"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:d13363f9f07316e06ebef8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        Chart.defaults.font.family = "'Chakra Petch', sans-serif";
        Chart.defaults.color = '#94a3b8';
        const themeColors = ['#38bdf8', '#fb7185', '#facc15', '#34d399', '#c084fc', '#fb923c'];

        let currentTargets = [];
        let startTimestamp = null; 

        let lineChart = new Chart(document.getElementById('lineChart').getContext('2d'), {
            type: 'line', data: { labels: [], datasets: [] },
            options: { 
                responsive: true, maintainAspectRatio: false, tension: 0.1, 
                plugins: { legend: { position: 'top' } },
                scales: { x: { min: 0 } } // ตรึงให้แสดงตั้งแต่จุดเริ่มต้นเลข 0 เสมอ
            }
        });

        let barChart = new Chart(document.getElementById('barChart').getContext('2d'), {
            type: 'bar', data: { labels: [], datasets: [] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        let doughnutChart = new Chart(document.getElementById('doughnutChart').getContext('2d'), {
            type: 'doughnut', data: { labels: [], datasets: [] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '70%' }
        });

        function buildDashboardUI(targets) {
            currentTargets = targets;
            const kpiPanel = document.getElementById('kpi-panel');
            kpiPanel.innerHTML = '';

            const totalHtml = `
                <div class="stat-box total-box">
                    <div class="stat-title" style="color: #ffffff;">TOTAL (ยอดรวมสะสม)</div>
                    <div class="stat-value" id="val-total" style="color: #ffffff;">0</div>
                </div>`;
            kpiPanel.insertAdjacentHTML('beforeend', totalHtml);

            lineChart.data.datasets = [];
            barChart.data.labels = targets;
            barChart.data.datasets = [{ data: [], backgroundColor: themeColors }];
            doughnutChart.data.labels = targets;
            doughnutChart.data.datasets = [{ data: [], backgroundColor: themeColors, borderWidth: 0 }];

            targets.forEach((target, index) => {
                const color = themeColors[index % themeColors.length];
                const boxHtml = `
                    <div class="stat-box" style="border-color: ${color};">
                        <div class="stat-title">${target}</div>
                        <div class="stat-value" id="val-${target}" style="color: ${color};">0</div>
                    </div>`;
                kpiPanel.insertAdjacentHTML('beforeend', boxHtml);

                lineChart.data.datasets.push({
                    label: target.toUpperCase(), data: [],
                    borderColor: color, backgroundColor: color + '11',
                    borderWidth: 2, fill: true
                });
            });
            lineChart.data.labels = [];
            [lineChart, barChart, doughnutChart].forEach(c => c.update());
        }

        onValue(ref(db, 'object_counts'), (snapshot) => {
            const payload = snapshot.val();
            if (!payload) return;

            const incomingTargets = payload.active_targets || [];
            if (JSON.stringify(incomingTargets) !== JSON.stringify(currentTargets)) {
                buildDashboardUI(incomingTargets);
                startTimestamp = payload.timestamp; 
            }

            if (!startTimestamp) startTimestamp = payload.timestamp;

            const currentCounts = payload.data || {};
            const accumulatedCounts = payload.accumulated || {}; 

            let elapsedSeconds = Math.floor(payload.timestamp - startTimestamp);
            if (elapsedSeconds < 0 || isNaN(elapsedSeconds)) elapsedSeconds = 0;
            const mins = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
            const secs = String(elapsedSeconds % 60).padStart(2, '0');
            const timeLabel = `${mins}:${secs}`;

            document.getElementById('last-update').innerText = `ELAPSED TIME: ${timeLabel}`;
            
            // ใส่เวลาลงในฐานแกน X (ถอดคำสั่ง .shift() ออกทั้งหมด เพื่อตรึงจุดเริ่มต้นไว้คงที่)
            lineChart.data.labels.push(timeLabel);

            let barData = [];
            let doughnutData = [];
            let totalAccCount = 0; 

            incomingTargets.forEach((target, index) => {
                const current = currentCounts[target] || 0;
                const acc = accumulatedCounts[target] || 0;
                totalAccCount += acc; 

                const valElement = document.getElementById(`val-${target}`);
                if (valElement) valElement.innerText = acc;

                // กราฟเส้นเปลี่ยนมาแสดง "ยอดสะสมเติบโตแบบต่อเนื่อง" ตาม Timeline ที่ตรึงไว้
                lineChart.data.datasets[index].data.push(acc);

                barData.push(acc);
                doughnutData.push(acc);
            });

            const totalElement = document.getElementById('val-total');
            if (totalElement) totalElement.innerText = totalAccCount;

            barChart.data.datasets[0].data = barData;
            doughnutChart.data.datasets[0].data = doughnutData;
            
            [lineChart, barChart, doughnutChart].forEach(c => c.update());
        });
    </script>
</body>
</html>
