<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Object Dashboard</title>
    
    <!-- Google Font: Chakra Petch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --highlight: #00ffcc;
        }
        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            aspect-ratio: 16/9; /* บังคับสัดส่วน 16:9 */
        }
        header {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--highlight);
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            flex-grow: 1;
        }
        .summary-panel {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .stat-box {
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid var(--highlight);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stat-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #aaaaaa;
        }
        .stat-value {
            font-size: 5rem; /* ตัวเลขขนาดใหญ่ มองเห็นชัดจากระยะไกล */
            font-weight: 700;
            margin-top: 10px;
            color: var(--highlight);
        }
        .chart-panel {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <header>LIVE OBJECT DETECTION DASHBOARD</header>

    <div class="container">
        <!-- ป้ายสรุปตัวเลขแบบ Big & Bold -->
        <div class="summary-panel" id="summary-panel">
            <div class="stat-box">
                <div class="stat-title">PERSON (คน)</div>
                <div class="stat-value" id="person-count">0</div>
            </div>
        </div>

        <!-- กราฟเส้นแสดงตามช่วงเวลา -->
        <div class="chart-panel">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <!-- โค้ด Firebase แบบ Modular (v12.13.0) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // ตั้งค่า Firebase ตามที่คุณให้มา
        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:d13363f9f07316e06ebef8",
            measurementId: "G-2JKLSGCT00"
        };

        // เริ่มต้นการเชื่อมต่อ Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        // -----------------------------------------
        // การตั้งค่ากราฟ Chart.js
        // -----------------------------------------
        const ctx = document.getElementById('historyChart').getContext('2d');
        Chart.defaults.font.family = "'Chakra Petch', sans-serif";
        Chart.defaults.color = '#ffffff';

        const historyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'จำนวนคน (Person)',
                    data: [],
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.2)',
                    borderWidth: 4,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { font: { size: 18 } } }
                },
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: { font: { size: 16 } }
                    },
                    x: {
                        ticks: { font: { size: 16 } }
                    }
                }
            }
        });

        // -----------------------------------------
        // การดึงข้อมูล Realtime จาก Firebase Database
        // -----------------------------------------
        const MAX_DATA_POINTS = 20; // จำนวนจุดบนกราฟที่จะแสดงผล
        const objectCountsRef = ref(db, 'object_counts'); // อ้างอิง Path ในฐานข้อมูล

        // เมื่อมีข้อมูลอัปเดตที่ฝั่ง Mac mini, ฟังก์ชันนี้จะทำงานทันที
        onValue(objectCountsRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.data) {
                const counts = data.data;
                const personCount = counts['person'] || 0;
                
                // 1. อัปเดตตัวเลขขนาดใหญ่บนหน้าเว็บ
                document.getElementById('person-count').innerText = personCount;

                // 2. อัปเดตข้อมูลในกราฟ
                const now = new Date();
                const timeLabel = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
                
                historyChart.data.labels.push(timeLabel);
                historyChart.data.datasets[0].data.push(personCount);

                // เลื่อนกราฟให้แสดงเฉพาะข้อมูล 20 รายการล่าสุด
                if (historyChart.data.labels.length > MAX_DATA_POINTS) {
                    historyChart.data.labels.shift();
                    historyChart.data.datasets[0].data.shift();
                }
                historyChart.update();
            }
        });
    </script>
</body>
</html>
